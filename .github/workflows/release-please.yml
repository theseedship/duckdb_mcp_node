name: Release Please

# DISABLED on push (2026-07-03): this workflow raced with publish.yml,
# which is the actual release path for this repo (manual version bump in
# package.json + hand-written CHANGELOG → publish.yml publishes to npm and
# creates the GitHub release on push). With both active, every release made
# release-please open a redundant PR that would inject a DUPLICATE version
# heading into CHANGELOG.md (flagged P1 by Greptile on PR #22) and carried
# its own `npm publish` step (double-publish risk). PRs #21/#22 were closed
# as superseded for this reason.
#
# Kept manually dispatchable in case the team ever wants to migrate to a
# release-please-driven flow — in that case, stop hand-bumping package.json
# and remove the release/publish steps from publish.yml instead.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: node

      # The logic below handles the npm publication
      - uses: actions/checkout@v4
        if: ${{ steps.release.outputs.release_created }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
        if: ${{ steps.release.outputs.release_created }}

      - run: npm ci
        if: ${{ steps.release.outputs.release_created }}

      - run: npm run build
        if: ${{ steps.release.outputs.release_created }}

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        if: ${{ steps.release.outputs.release_created }}
